name: Ludere Payload Autogen

on:
  workflow_dispatch:
    inputs:
      payload:
        description: "Direct Dropbox download URL"
        required: true
        type: string

permissions:
  contents: write

jobs:
  autogen:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create working directories
        run: |
          mkdir -p autogen/input
          mkdir -p autogen/output

      - name: Download payload
        run: |
          curl -fL "${{ inputs.payload }}" -o autogen/input/payload.zip

      - name: Extract payload
        run: |
          unzip -oq autogen/input/payload.zip -d autogen/input
          rm autogen/input/payload.zip

      - name: Verify payload
        id: verify
        run: |
          # overlay.xml is optional and separate from the config XML --
          # count them independently so a payload that includes both
          # doesn't create ambiguity about which XML is the config.
          CONFIG_XML_COUNT=$(find autogen/input -maxdepth 1 -type f -iname "*.xml" ! -iname "overlay.xml" | wc -l)
          PNG_COUNT=$(find autogen/input -maxdepth 1 -type f -iname "*.png" | wc -l)

          if [ "$CONFIG_XML_COUNT" -lt 1 ]; then
            echo "Missing config XML file (*.xml, other than overlay.xml)"; exit 1
          fi

          if [ "$CONFIG_XML_COUNT" -gt 1 ]; then
            echo "Found multiple candidate config XML files -- payload must contain exactly one config XML (plus an optional overlay.xml)."
            exit 1
          fi

          if [ "$PNG_COUNT" -lt 1 ]; then
            echo "Missing icon PNG file (*.png)"; exit 1
          fi

          ROM=$(find autogen/input -maxdepth 1 -type f ! -iname "*.xml" ! -iname "*.png")
          ROM_COUNT=$(echo "$ROM" | grep -c . || true)

          if [ "$ROM_COUNT" -ne 1 ]; then
            echo "Payload must contain exactly one ROM file."
            exit 1
          fi

          EXT="${ROM##*.}"
          echo "rom_ext=${EXT,,}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xmlstarlet zip unzip

      - name: Set up JDKs
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          # sdkmanager (recent cmdline-tools) requires JDK 17, but AGP
          # 7.4.2 / Gradle 8.0 need JDK 11. Install both; JAVA_HOME ends up
          # pointing at the last entry (11), used for the Gradle build.
          # JDK 17 is still available via JAVA_HOME_17_X64 for the
          # "Install CMake" step below.
          java-version: |
            17
            11

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # NOTE: gradle-version: wrapper is unreliable in this action (see
          # gradle/actions#273) and can silently install the latest Gradle
          # instead of the version in gradle-wrapper.properties. Pin the
          # version explicitly to match gradle-wrapper.properties (8.0).
          gradle-version: "8.0"

      - name: Install CMake
        run: |
          # Must match the "version" pinned in app/build.gradle's
          # externalNativeBuild.cmake block.
          # sdkmanager isn't on PATH by default on hosted runners, so
          # locate it under the SDK's cmdline-tools directory. It also
          # requires JDK 17 to run, so override JAVA_HOME for this step
          # only (the Gradle build later still uses JDK 11).
          export JAVA_HOME="$JAVA_HOME_17_X64"
          SDKMANAGER="$(find "$ANDROID_HOME/cmdline-tools" -name sdkmanager -type f | sort -V | tail -n1)"
          yes | "$SDKMANAGER" --install "cmake;3.22.1"

      - name: Download libretro core
        run: |
          # Mirrors the extension -> core mapping in CoreSelector.java.
          # Keep these two in sync if new systems are added.
          case "${{ steps.verify.outputs.rom_ext }}" in
            nes|fds|unf|unif)      CORE="fceumm" ;;
            sfc|smc|fig)           CORE="snes9x" ;;
            gb|gbc|sgb)            CORE="gambatte" ;;
            gba|agb)               CORE="mgba" ;;
            gen|md|smd|bin)        CORE="genesis_plus_gx" ;;
            sms)                   CORE="genesis_plus_gx" ;;
            gg)                    CORE="genesis_plus_gx" ;;
            pce)                   CORE="mednafen_pce_fast" ;;
            n64|z64|v64)           CORE="mupen64plus_next"; DOWNLOAD_CORE="mupen64plus_next_gles3" ;;
            cue|iso)               CORE="mednafen_psx_hw" ;;
            nds)                   CORE="desmume2015" ;;
            zip)                   CORE="mame2003_plus" ;;
            *)
              echo "No core mapping for extension: ${{ steps.verify.outputs.rom_ext }}"
              exit 1
              ;;
          esac

          # DOWNLOAD_CORE is the buildbot filename; CORE is the id
          # CoreSelector.java / nativeInit expect (matters when the
          # buildbot's core name differs from the app's core id, e.g. N64).
          DOWNLOAD_CORE="${DOWNLOAD_CORE:-$CORE}"

          echo "Selected core: $CORE (downloading $DOWNLOAD_CORE)"
          BASE_URL="https://buildbot.libretro.com/nightly/android/latest"

          for ABI in armeabi-v7a arm64-v8a x86 x86_64; do
            DEST_DIR="app/src/main/jniLibs/$ABI"
            mkdir -p "$DEST_DIR"

            URL="$BASE_URL/$ABI/${DOWNLOAD_CORE}_libretro_android.so.zip"
            echo "Fetching $URL"
            curl -fL "$URL" -o "core.zip"

            unzip -oq "core.zip" -d "core_extract_$ABI"
            SO_FILE=$(find "core_extract_$ABI" -name "*.so" | head -n1)

            if [ -z "$SO_FILE" ]; then
              echo "No .so found in downloaded core archive for $ABI"
              exit 1
            fi

            cp "$SO_FILE" "$DEST_DIR/lib${CORE}_libretro.so"
            rm -rf "core.zip" "core_extract_$ABI"
          done

      - name: Run Autogen
        run: |
          chmod +x autogen/generate
          ./autogen/generate

      - name: Package output
        run: |
          cd autogen/output
          zip -r ../output.zip .

      - name: Timestamp
        id: stamp
        run: |
          echo "date=$(date +'%Y-%m-%dT%H-%M-%S')" >> "$GITHUB_OUTPUT"

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: payload-${{ steps.stamp.outputs.date }}
          name: Ludere Payload ${{ steps.stamp.outputs.date }}
          files: autogen/output.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
