name: Extract Uploaded Project

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find ZIP
        id: zip
        run: |
          ZIP=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          echo "zip=$ZIP" >> $GITHUB_OUTPUT

      - name: Stop if no ZIP found
        if: steps.zip.outputs.zip == ''
        run: |
          echo "No ZIP found."
          exit 0

      - name: Extract archive
        run: |
          mkdir extracted
          unzip -q "${{ steps.zip.outputs.zip }}" -d extracted

      - name: Flatten directory if needed
        run: |
          TOP=$(find extracted -mindepth 1 -maxdepth 1 -type d | head -n1)

          if [ -n "$TOP" ] && [ "$(find extracted -mindepth 1 -maxdepth 1 | wc -l)" -eq 1 ]; then
            mv "$TOP"/* .
            mv "$TOP"/.* . 2>/dev/null || true
          else
            mv extracted/* .
            mv extracted/.* . 2>/dev/null || true
          fi

          rm -rf extracted

      - name: Remove ZIP
        run: |
          rm -f *.zip

      - name: Commit extracted project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git commit -m "Automatically extract uploaded project"
          git push
