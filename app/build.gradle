plugins {
    id 'com.android.application'
}

android {
    namespace 'com.ludere.legacy'
    compileSdk 33

    defaultConfig {
        applicationId "com.ludere.legacy"
        minSdk 17
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.10.2"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // No AndroidX, No Jetpack as requested
}
